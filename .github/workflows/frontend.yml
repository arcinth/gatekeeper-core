name: Frontend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      # Milestone 10: Security Hardening. --audit-level=high matches the backend's
      # CVSS >= 7 policy (OWASP Dependency-Check) - see docs/Security-Hardening.md.
      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=high
