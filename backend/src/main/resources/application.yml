spring:
  application:
    name: gatekeeper-core
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/gatekeeper}
    username: ${DB_USERNAME:gatekeeper}
    password: ${DB_PASSWORD:gatekeeper}
    hikari:
      pool-name: gatekeeper-pool
      maximum-pool-size: 10
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  data:
    web:
      pageable:
        max-page-size: 100
        one-indexed-parameters: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

gatekeeper:
  security:
    jwt:
      # If this default ever changes, update JwtSecretStartupValidator.DEFAULT_JWT_SECRET to match -
      # it fails startup under prod if JWT_SECRET still resolves to this value.
      secret: ${JWT_SECRET:local-development-secret-key-change-me-in-production-please-0123456789}
      access-token-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
      refresh-token-ttl-days: ${JWT_REFRESH_TTL_DAYS:7}
      issuer: gatekeeper-core
  bootstrap:
    admin:
      email: ${BOOTSTRAP_ADMIN_EMAIL:admin@gatekeeper.local}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:ChangeMe123!}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  github:
    app:
      # 0 is treated as "unset" - GitHubSecretsStartupValidator fails startup under prod if this is still 0.
      id: ${GITHUB_APP_ID:0}
      # PKCS#8 PEM ("-----BEGIN PRIVATE KEY-----"). GitHub issues PKCS#1 keys by default; convert with:
      # openssl pkcs8 -topk8 -inform PEM -outform PEM -nocrypt -in <downloaded-key>.pem -out <pkcs8-key>.pem
      #
      # Two ways to supply it - GitHubAppAuthService prefers private-key-path when set:
      #   - private-key: the PEM content itself, as a single environment variable value.
      #   - private-key-path: a path to a PEM file on disk (see secrets/README.md). Preferred for
      #     real deployments, since a multi-line key is awkward to carry as one env var value.
      private-key: ${GITHUB_APP_PRIVATE_KEY:}
      private-key-path: ${GITHUB_APP_PRIVATE_KEY_PATH:}
    webhook:
      # If this default ever changes, update GitHubSecretsStartupValidator.DEFAULT_WEBHOOK_SECRET to match -
      # it fails startup under prod if GITHUB_WEBHOOK_SECRET still resolves to this value.
      secret: ${GITHUB_WEBHOOK_SECRET:local-development-webhook-secret-change-me-in-production-please}
    api:
      base-url: ${GITHUB_API_BASE_URL:https://api.github.com}
      retry:
        max-attempts: ${GITHUB_API_RETRY_MAX_ATTEMPTS:3}
        initial-backoff-ms: ${GITHUB_API_RETRY_INITIAL_BACKOFF_MS:500}
        backoff-multiplier: ${GITHUB_API_RETRY_BACKOFF_MULTIPLIER:2}
    check-run:
      # Name shown in GitHub's Checks UI for the check GitHubCheckRunService publishes.
      name: ${GITHUB_CHECK_RUN_NAME:GateKeeper}
  analysis:
    # Bounds worst-case latency/memory for a single AnalysisRun against a
    # pathologically large PR (Milestone 4 Architecture, Section 1).
    max-changed-files-per-pull-request: ${ANALYSIS_MAX_CHANGED_FILES:300}
    execution:
      core-pool-size: ${ANALYSIS_EXECUTION_CORE_POOL_SIZE:2}
      max-pool-size: ${ANALYSIS_EXECUTION_MAX_POOL_SIZE:8}
      queue-capacity: ${ANALYSIS_EXECUTION_QUEUE_CAPACITY:50}
  ai-review:
    # Off by default: an empty api-key would fail every call anyway, and the
    # AI Review Engine is advisory-only, so there is no reason to default to
    # "on" before an operator has deliberately supplied credentials.
    enabled: ${AI_REVIEW_ENABLED:false}
    anthropic:
      base-url: ${ANTHROPIC_API_BASE_URL:https://api.anthropic.com}
      api-key: ${ANTHROPIC_API_KEY:}
      api-version: ${ANTHROPIC_API_VERSION:2023-06-01}
      model: ${ANTHROPIC_MODEL:claude-opus-4-6}
      prompt-version: ${ANTHROPIC_PROMPT_VERSION:v1}
      connect-timeout-ms: ${ANTHROPIC_CONNECT_TIMEOUT_MS:5000}
      read-timeout-ms: ${ANTHROPIC_READ_TIMEOUT_MS:30000}
      retry:
        max-attempts: ${ANTHROPIC_RETRY_MAX_ATTEMPTS:3}
        initial-backoff-ms: ${ANTHROPIC_RETRY_INITIAL_BACKOFF_MS:500}
        backoff-multiplier: ${ANTHROPIC_RETRY_BACKOFF_MULTIPLIER:2}
    execution:
      # Smaller than gatekeeper.analysis.execution's defaults: an LLM call is
      # slower and costlier per-request than the deterministic engines, so a
      # smaller bounded pool is a deliberate throttle, not an oversight
      # (Sprint 4 Milestone 3 - AsyncConfig's aiReviewTaskExecutor).
      core-pool-size: ${AI_REVIEW_EXECUTION_CORE_POOL_SIZE:1}
      max-pool-size: ${AI_REVIEW_EXECUTION_MAX_POOL_SIZE:4}
      queue-capacity: ${AI_REVIEW_EXECUTION_QUEUE_CAPACITY:50}
  report:
    # Bounds how long the Report Engine waits for AI Review's independent
    # async completion before publishing anyway with aiReviewStatus=UNAVAILABLE
    # (Unified Engineering Report Architecture, Section 6 / ADR-046) - AI
    # Review must never delay the report the same way it must never delay
    # the governance decision itself.
    ai-wait-timeout-seconds: ${REPORT_AI_WAIT_TIMEOUT_SECONDS:120}
    sweep-interval-ms: ${REPORT_SWEEP_INTERVAL_MS:60000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.gatekeeper: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"
