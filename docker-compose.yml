services:
  postgres:
    image: postgres:16-alpine
    container_name: gatekeeper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-gatekeeper}
      POSTGRES_USER: ${DB_USERNAME:-gatekeeper}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gatekeeper}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-gatekeeper}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gatekeeper-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-gatekeeper}
      DB_USERNAME: ${DB_USERNAME:-gatekeeper}
      DB_PASSWORD: ${DB_PASSWORD:-gatekeeper}
      JWT_SECRET: ${JWT_SECRET:-local-development-secret-key-change-me-in-production-please-0123456789}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@gatekeeper.local}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-ChangeMe123!}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-0}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-local-development-webhook-secret-change-me-in-production-please}
      # ./secrets is mounted read-only below at /secrets, so this must be a
      # container-side path, not the host-side one used by ./mvnw spring-boot:run.
      GITHUB_APP_PRIVATE_KEY_PATH: ${GITHUB_APP_PRIVATE_KEY_PATH:-}
    volumes:
      - ./secrets:/secrets:ro
    ports:
      - "${SERVER_PORT:-8080}:8080"

  # frontend:
  #   Not containerized yet (Sprint 1 scope). Run locally with `npm run dev`
  #   inside ./frontend against the backend published on port 8080.
  #   Prepared for future sprints:
  #
  #   build:
  #     context: ./frontend
