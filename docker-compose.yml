  #   container_name: gatekeeper-frontend
  #   depends_on:
  #     - backend
  #   environment:
  #     VITE_API_BASE_URL: http://localhost:8080/api/v1
  #   ports:
  #     - "5173:5173"

volumes:
  postgres-data:
