spring:
  application:
    name: gatekeeper-core
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/gatekeeper}
    username: ${DB_USERNAME:gatekeeper}
    password: ${DB_PASSWORD:gatekeeper}
    hikari:
      pool-name: gatekeeper-pool
      maximum-pool-size: 10
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  data:
    web:
      pageable:
        max-page-size: 100
        one-indexed-parameters: false
  servlet:
    multipart:
      # No endpoint in this codebase accepts a file upload today - these are a
      # deliberate, explicit ceiling rather than Spring Boot's implicit default,
      # so a future multipart endpoint inherits a reviewed limit by default
      # instead of an unbounded one (Milestone 10: Security Hardening, Section 5).
      max-file-size: 1MB
      max-request-size: 1MB
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
  tomcat:
    # Explicit request-size ceilings (Milestone 10: Security Hardening, Section 5) -
    # each value below matches Tomcat's own current default; made explicit so the
    # limit is a reviewed, documented decision rather than an implicit default that
    # could silently change with a future Tomcat upgrade.
    max-http-request-header-size: 8KB
    max-swallow-size: 2MB
    max-http-form-post-size: 2MB

gatekeeper:
  security:
    jwt:
      # If this default ever changes, update JwtSecretStartupValidator.DEFAULT_JWT_SECRET to match -
      # it fails startup under prod if JWT_SECRET still resolves to this value.
      secret: ${JWT_SECRET:local-development-secret-key-change-me-in-production-please-0123456789}
      access-token-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
      refresh-token-ttl-days: ${JWT_REFRESH_TTL_DAYS:7}
      issuer: gatekeeper-core
      # Bounded tolerance for clock drift between application instances/NTP when
      # validating a token's iat/exp (Milestone 10: Security Hardening) - the same
      # kind of allowance GitHubAppAuthService already applies to GitHub's own App JWTs.
      clock-skew-seconds: ${JWT_CLOCK_SKEW_SECONDS:30}
  rate-limit:
    # In-memory token buckets (Milestone 10: Security Hardening, Section 3) - see
    # com.gatekeeper.security.ratelimit.RateLimitService. Every threshold below is a
    # capacity that refills entirely once per refill-period-seconds (a simple, single-
    # window bucket, not a two-tier burst+sustained shape - see docs/Security-Hardening.md
    # for why that was simplified for this milestone).
    login-ip:
      capacity: ${RATE_LIMIT_LOGIN_IP_CAPACITY:10}
      refill-period-seconds: ${RATE_LIMIT_LOGIN_IP_REFILL_SECONDS:60}
    login-account:
      capacity: ${RATE_LIMIT_LOGIN_ACCOUNT_CAPACITY:5}
      refill-period-seconds: ${RATE_LIMIT_LOGIN_ACCOUNT_REFILL_SECONDS:60}
    refresh:
      capacity: ${RATE_LIMIT_REFRESH_CAPACITY:10}
      refill-period-seconds: ${RATE_LIMIT_REFRESH_REFILL_SECONDS:60}
    webhook:
      capacity: ${RATE_LIMIT_WEBHOOK_CAPACITY:100}
      refill-period-seconds: ${RATE_LIMIT_WEBHOOK_REFILL_SECONDS:60}
    repository-sync:
      capacity: ${RATE_LIMIT_REPOSITORY_SYNC_CAPACITY:5}
      refill-period-seconds: ${RATE_LIMIT_REPOSITORY_SYNC_REFILL_SECONDS:60}
    # How often InMemoryRateLimiter evicts fully-refilled (idle) buckets.
    cleanup-interval-ms: ${RATE_LIMIT_CLEANUP_INTERVAL_MS:300000}
  bootstrap:
    admin:
      email: ${BOOTSTRAP_ADMIN_EMAIL:admin@gatekeeper.local}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:ChangeMe123!}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  github:
    app:
      # 0 is treated as "unset" - GitHubSecretsStartupValidator fails startup under prod if this is still 0.
      id: ${GITHUB_APP_ID:0}
      # The App's public URL slug, e.g. "gatekeeper-core" from https://github.com/apps/gatekeeper-core.
      # Used only to build the install-url GitHubInstallationController returns (Milestone 8: Repository
      # Onboarding) - blank means "not configured", and that endpoint reports appConfigured=false rather
      # than returning a broken link.
      slug: ${GITHUB_APP_SLUG:}
      # PKCS#8 PEM ("-----BEGIN PRIVATE KEY-----"). GitHub issues PKCS#1 keys by default; convert with:
      # openssl pkcs8 -topk8 -inform PEM -outform PEM -nocrypt -in <downloaded-key>.pem -out <pkcs8-key>.pem
      #
      # Two ways to supply it - GitHubAppAuthService prefers private-key-path when set:
      #   - private-key: the PEM content itself, as a single environment variable value.
      #   - private-key-path: a path to a PEM file on disk (see secrets/README.md). Preferred for
      #     real deployments, since a multi-line key is awkward to carry as one env var value.
      private-key: ${GITHUB_APP_PRIVATE_KEY:}
      private-key-path: ${GITHUB_APP_PRIVATE_KEY_PATH:}
    webhook:
      # If this default ever changes, update GitHubSecretsStartupValidator.DEFAULT_WEBHOOK_SECRET to match -
      # it fails startup under prod if GITHUB_WEBHOOK_SECRET still resolves to this value.
      secret: ${GITHUB_WEBHOOK_SECRET:local-development-webhook-secret-change-me-in-production-please}
    api:
      base-url: ${GITHUB_API_BASE_URL:https://api.github.com}
      retry:
        max-attempts: ${GITHUB_API_RETRY_MAX_ATTEMPTS:3}
        initial-backoff-ms: ${GITHUB_API_RETRY_INITIAL_BACKOFF_MS:500}
        backoff-multiplier: ${GITHUB_API_RETRY_BACKOFF_MULTIPLIER:2}
    check-run:
      # Name shown in GitHub's Checks UI for the check GitHubCheckRunService publishes.
      name: ${GITHUB_CHECK_RUN_NAME:GateKeeper}
      # Name for the separate check GitHubReviewDecisionCheckRunService publishes (Milestone 4) -
      # deliberately distinct from the check above: analysis and human review are two independent
      # sources of truth, and this name must never collide with it.
      review-decision-name: ${GITHUB_REVIEW_CHECK_RUN_NAME:GateKeeper Review}
  analysis:
    # Bounds worst-case latency/memory for a single AnalysisRun against a
    # pathologically large PR (Milestone 4 Architecture, Section 1).
    max-changed-files-per-pull-request: ${ANALYSIS_MAX_CHANGED_FILES:300}
    execution:
      core-pool-size: ${ANALYSIS_EXECUTION_CORE_POOL_SIZE:2}
      max-pool-size: ${ANALYSIS_EXECUTION_MAX_POOL_SIZE:8}
      queue-capacity: ${ANALYSIS_EXECUTION_QUEUE_CAPACITY:50}
  ai-review:
    # Off by default: an empty api-key would fail every call anyway, and the
    # AI Review Engine is advisory-only, so there is no reason to default to
    # "on" before an operator has deliberately supplied credentials.
    enabled: ${AI_REVIEW_ENABLED:false}
    anthropic:
      base-url: ${ANTHROPIC_API_BASE_URL:https://api.anthropic.com}
      api-key: ${ANTHROPIC_API_KEY:}
      api-version: ${ANTHROPIC_API_VERSION:2023-06-01}
      model: ${ANTHROPIC_MODEL:claude-opus-4-6}
      prompt-version: ${ANTHROPIC_PROMPT_VERSION:v1}
      connect-timeout-ms: ${ANTHROPIC_CONNECT_TIMEOUT_MS:5000}
      read-timeout-ms: ${ANTHROPIC_READ_TIMEOUT_MS:30000}
      retry:
        max-attempts: ${ANTHROPIC_RETRY_MAX_ATTEMPTS:3}
        initial-backoff-ms: ${ANTHROPIC_RETRY_INITIAL_BACKOFF_MS:500}
        backoff-multiplier: ${ANTHROPIC_RETRY_BACKOFF_MULTIPLIER:2}
    execution:
      # Smaller than gatekeeper.analysis.execution's defaults: an LLM call is
      # slower and costlier per-request than the deterministic engines, so a
      # smaller bounded pool is a deliberate throttle, not an oversight
      # (Sprint 4 Milestone 3 - AsyncConfig's aiReviewTaskExecutor).
      core-pool-size: ${AI_REVIEW_EXECUTION_CORE_POOL_SIZE:1}
      max-pool-size: ${AI_REVIEW_EXECUTION_MAX_POOL_SIZE:4}
      queue-capacity: ${AI_REVIEW_EXECUTION_QUEUE_CAPACITY:50}
  report:
    # Bounds how long the Report Engine waits for AI Review's independent
    # async completion before publishing anyway with aiReviewStatus=UNAVAILABLE
    # (Unified Engineering Report Architecture, Section 6 / ADR-046) - AI
    # Review must never delay the report the same way it must never delay
    # the governance decision itself.
    ai-wait-timeout-seconds: ${REPORT_AI_WAIT_TIMEOUT_SECONDS:120}
    sweep-interval-ms: ${REPORT_SWEEP_INTERVAL_MS:60000}
  observability:
    # Deployment-environment label surfaced by /actuator/info (Milestone 9),
    # independent of the Spring profile name so an operator can run under any
    # profile naming scheme and still get a clean Local/Development/Staging/
    # Production label. Case-insensitive substring match against this value -
    # see ApplicationInfoContributor.
    environment: ${DEPLOYMENT_ENVIRONMENT:local}
    thresholds:
      # WARN-level "slow operation" thresholds for @ObservedOperation
      # (Milestone 9: Observability) - tunable per environment without a
      # redeploy. Defaults reflect each operation category's normal cost, not
      # an SLA - see docs/Observability.md.
      github-api-ms: ${OBSERVABILITY_THRESHOLD_GITHUB_API_MS:3000}
      policy-evaluation-ms: ${OBSERVABILITY_THRESHOLD_POLICY_MS:1000}
      security-evaluation-ms: ${OBSERVABILITY_THRESHOLD_SECURITY_MS:1000}
      review-evaluation-ms: ${OBSERVABILITY_THRESHOLD_REVIEW_MS:30000}
      analysis-pipeline-ms: ${OBSERVABILITY_THRESHOLD_ANALYSIS_MS:5000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

management:
  server:
    # Actuator is served on its own port, entirely separate from the public
    # API (server.port) - the same trust boundary Postgres itself already
    # relies on in this project (docker-compose never exposes it with
    # application-level auth either). Nothing on this port requires a JWT;
    # security is "not reachable from outside the private network," not an
    # application-layer check (Milestone 9: Observability, ADR - see
    # docs/Observability.md). Do not publish this port on a public load
    # balancer/ingress in a real deployment.
    port: ${MANAGEMENT_SERVER_PORT:8081}
  endpoints:
    web:
      # Explicit allowlist - env/beans/configprops/mappings/heapdump/threaddump/
      # shutdown are deliberately never included, in any profile, regardless of
      # the management port's network isolation (defense in depth).
      exposure:
        include: health,info,metrics,prometheus,startup
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState
    startup:
      enabled: true
    metrics:
      access: unrestricted
    prometheus:
      access: unrestricted
  info:
    env:
      enabled: true
    java:
      enabled: true
    build:
      enabled: true
    git:
      mode: full
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.gatekeeper: INFO
