name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          # Caches ~/.m2/repository, keyed on pom.xml.
          cache: maven

      # GitHub-hosted ubuntu-latest runners ship with a running Docker daemon,
      # so the Testcontainers-based integration tests run as part of this build
      # rather than being skipped.
      - name: Build and test
        working-directory: backend
        run: ./mvnw clean package
